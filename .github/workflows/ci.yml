name: CI

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        platform: [x64, ARM64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build src\BrowserWrangler -c Release -p:Platform=${{ matrix.platform }}

      - name: Test
        if: matrix.platform == 'x64'
        run: dotnet test tests\BrowserWrangler.Core.Tests -c Release
